<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tracking LinkedIn — Pré-suasion</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    /* fond gris perle froid */
    --bg:        #EFF0F2;
    --bg-2:      #E4E6EA;
    /* surfaces tonales (jamais de blanc pur) */
    --card:      #F4F5F7;
    --surface:   #F4F5F7;
    --surface-2: #ECEEF1;
    --stroke:    rgba(21,21,34,0.06);
    --stroke-2:  rgba(21,21,34,0.13);
    /* RADIUS VERROUILLÉ — surfaces = 16px partout */
    --r:         16px;
    /* encre */
    --ink-1:     #151522;
    --ink-2:     #7A8190;
    --ink-3:     #A7ABB6;
    /* accent menthe néon doux */
    --green:     #7AF9A5;
    --green-soft:#B9F8C9;
    --green-ink: #102315;
    --green-2:   #0E7A45;
    /* alerte (usée très parcimonieusement) */
    --alert:     #C0473F;
    /* macOS feux de circulation */
    --mac-red:   #FF5F57;
    --mac-amber: #FEBC2E;
    --mac-green: #28C840;
    --glow:      1;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink-1);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app-root {
    position: relative;
    min-height: 100vh;
    background-color: var(--bg);
    background-image: repeating-linear-gradient(90deg,
      transparent, transparent 159px,
      rgba(20,20,38,calc(var(--glow)*0.04)) 159px,
      rgba(20,20,38,calc(var(--glow)*0.04)) 160px);
    overflow-x: hidden;
  }

  /* utilitaire : titre brutaliste */
  .display {
    font-weight: 800;
    line-height: 0.96;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: var(--ink-1);
  }

  /* étiquette noire (eyebrow Webyn) */
  .tag {
    display: inline-flex; align-items: center;
    background: var(--ink-1); color: #fff;
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.10em; text-transform: uppercase;
    padding: 5px 9px; border-radius: 4px; white-space: nowrap;
  }
  .tag-green { background: var(--green); color: var(--green-ink); }
  .tag-outline { background: transparent; color: var(--ink-1); border: 1.5px solid var(--ink-1); }

  /* ── Header ───────────────────────────────────────── */
  .app-header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; padding: 0 26px;
    background: rgba(239,240,242,0.82);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--stroke);
  }
  .brand {
    display: inline-flex; align-items: center; gap: 11px;
    color: var(--ink-1); font-weight: 800; font-size: 17px;
    letter-spacing: -0.02em; white-space: nowrap;
  }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 50%;
    object-fit: cover; display: block; flex-shrink: 0;
  }
  .brand-logo { height: 19px; width: auto; display: block; }
  .nav-btn {
    position: relative; padding: 8px 14px;
    background: transparent; color: var(--ink-3);
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; font-family: inherit;
    letter-spacing: 0.01em; cursor: pointer;
    transition: color .15s, background .15s;
  }
  .nav-btn:hover { color: var(--ink-1); }
  .nav-active { color: var(--ink-1); background: rgba(13,16,20,0.06); }
  .nav-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-left: 7px; vertical-align: middle;
    box-shadow: 0 0 0 3px rgba(31,223,124,0.22);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Breadcrumb ───────────────────────────────────── */
  .breadcrumb {
    position: sticky; top: 64px; z-index: 19;
    display: flex; align-items: center; gap: 10px;
    padding: 11px 26px;
    background: rgba(239,240,242,0.72);
    border-bottom: 1px solid var(--stroke);
    backdrop-filter: blur(12px);
  }
  .crumb-back {
    background: none; border: none; color: var(--ink-3);
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; padding: 0; transition: color .15s;
  }
  .crumb-back:hover { color: var(--ink-1); }

  /* ── Boutons ──────────────────────────────────────── */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; background: var(--green); color: var(--green-ink);
    border: none; border-radius: 9px;
    font-size: 12px; font-weight: 800; font-family: inherit;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer; transition: transform .18s ease, filter .18s ease;
  }
  .btn-primary:hover { filter: brightness(1.04); transform: translateY(-1px); }
  .btn-primary:active { transform: scale(0.97); filter: brightness(0.98); }
  .btn-primary.lg { padding: 14px 22px; border-radius: 11px; font-size: 13px; justify-content: center; }

  @keyframes toastIn { from { opacity: 0; transform: translateY(10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes sbpop { from { opacity: 0; transform: scale(0.82) rotate(-8deg); } to { opacity: 1; transform: scale(1) rotate(0); } }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 15px; background: transparent; color: var(--ink-1);
    border: 1.5px solid var(--ink-1); border-radius: 16px;
    font-size: 12px; font-weight: 800; font-family: inherit;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer; transition: all .18s ease;
  }
  .btn-ghost:hover { background: var(--ink-1); color: #fff; }

  .btn-alert {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 9px;
    background: var(--alert); color: #fff; border: none;
    font-size: 12px; font-weight: 800; font-family: inherit;
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer; transition: all .18s ease;
  }
  .btn-alert:hover { filter: brightness(1.06); transform: translateY(-1px); }

  /* chip flèche (CTA hero, style Webyn) */
  .cta {
    display: inline-flex; align-items: stretch; gap: 0;
    border: none; background: var(--green); color: var(--green-ink);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    font-family: inherit; transition: transform .18s ease, filter .18s ease;
  }
  .cta:hover { filter: brightness(1.04); transform: translateY(-1px); }
  .cta .chip {
    display: grid; place-items: center; width: 46px; align-self: stretch;
    background: rgba(0,0,0,0.14); font-size: 17px;
  }
  .cta .lbl {
    padding: 15px 22px; font-size: 13.5px; font-weight: 800;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* ── Table rows hover ─────────────────────────────── */
  .lead-row:hover { background: var(--surface-2); }
  .relance-row:hover { border-color: var(--stroke-2) !important; background: var(--surface-2) !important; }

  /* ── Responsive ───────────────────────────────────── */
  /* ── Sidebar shell ────────────────────────────────── */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; flex-shrink: 0; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column;
    padding: 20px 14px; border-right: 1px solid var(--stroke); background: var(--bg);
    z-index: 30;
  }
  .side-brand { display: flex; align-items: center; gap: 11px; padding: 4px 8px 20px; }
  .side-nav { display: flex; flex-direction: column; gap: 3px; }
  .side-item {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 10px 12px; border: none; border-radius: 11px; background: transparent;
    font-family: inherit; font-size: 13.5px; font-weight: 700; color: var(--ink-2);
    letter-spacing: 0.01em; cursor: pointer; transition: background .15s, color .15s; text-align: left;
  }
  .side-item:hover { background: var(--surface-2); color: var(--ink-1); }
  .side-item.active { background: var(--ink-1); color: #fff; }
  .side-item .ic { width: 17px; height: 17px; flex-shrink: 0; stroke: currentColor; }
  .side-badge { margin-left: auto; font-size: 11px; font-weight: 800; color: var(--alert); }
  .side-item.active .side-badge { color: var(--green); }
  .side-foot { margin-top: auto; }
  .side-gear {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 10px 12px; border: none; border-radius: 11px; background: transparent;
    font-family: inherit; font-size: 13px; font-weight: 700; color: var(--ink-3);
    cursor: pointer; transition: background .15s, color .15s;
  }
  .side-gear:hover { background: var(--surface-2); color: var(--ink-1); }
  .content { flex: 1; min-width: 0; }
  .content-pad { padding: var(--shell-pad); max-width: 1180px; margin: 0 auto; }
  .settings-pop {
    position: fixed; bottom: 18px; left: 230px; z-index: 60;
    width: 248px; background: var(--card); border: 1px solid var(--stroke);
    border-radius: 16px; padding: 16px 16px 6px; box-shadow: 0 1px 2px rgba(13,16,20,0.04);
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 1000px) {
    .perf-main { grid-template-columns: 1fr !important; }
    .cout-grid { grid-template-columns: 1fr !important; }
    .psy-intel { grid-template-columns: 1fr !important; }
    .market-intel { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 820px) {
    .sidebar { width: 64px; }
    .side-label, .side-brand-name { display: none; }
    .dash-grid { grid-template-columns: 1fr !important; }
    .market-cols { grid-template-columns: repeat(2, 1fr) !important; }
    .perf-kpi { grid-template-columns: repeat(2, 1fr) !important; }
    .perf-daily { grid-template-columns: repeat(2, 1fr) !important; }
    .presu-3 { grid-template-columns: 1fr !important; }
    .presu-2 { grid-template-columns: 1fr !important; }
    .obj-inputs { grid-template-columns: 1fr !important; }
    .obj-chain { grid-template-columns: repeat(3, 1fr) !important; }
    .perf-leviers { grid-template-columns: 1fr !important; }
    .perf-grid { grid-template-columns: 1fr !important; }
    .leads-kpi { grid-template-columns: repeat(2, 1fr) !important; }
    .perf-main { grid-template-columns: 1fr !important; }
    .timing-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .fu-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .mi-detail { grid-template-columns: 1fr !important; }
  }
  .reply-opt:hover { transform: translateY(-1px); }

  /* ── Fenêtre macOS (chrome feux rouge/jaune/vert) ─── */
  .mac {
    background: var(--card);
    border: 1px solid var(--stroke);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(20,20,38,0.04);
  }
  .mac-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--stroke);
    background: var(--surface-2);
  }
  .mac-dots { display: flex; gap: 8px; }
  .mac-dots i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .mac-title {
    font-size: 12.5px; color: var(--ink-3); font-weight: 600;
    letter-spacing: 0.01em; white-space: nowrap;
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(13,16,20,0.18); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(13,16,20,0.30); background-clip: padding-box; }

  ::selection { background: var(--green); color: var(--green-ink); }

  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/screens.jsx"></script>
  <script src="app/face.js"></script>
  <script src="app/logo.js"></script>
  <script type="text/babel" src="app/perf.jsx"></script>
  <script type="text/babel" src="app/presu-a.jsx"></script>
  <script type="text/babel" src="app/presu-b.jsx"></script>
  <script type="text/babel" src="app/presuasion.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
